<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notícias | GameVerse</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body style="padding-top:70px;">
  <nav class="navbar navbar-expand-lg fixed-top" data-cy="main-navbar">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-controller text-danger"></i> Game<span class="text-danger">Verse</span>
      </a>
      <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#nav-menu">
        <i class="bi bi-list fs-2"></i>
      </button>
      <div class="collapse navbar-collapse" id="nav-menu">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="../index.html" data-cy="nav-home">Início</a></li>
          <li class="nav-item"><a class="nav-link active" href="noticias.html" data-cy="nav-news">Notícias</a></li>
          <li class="nav-item"><a class="nav-link" href="reviews.html" data-cy="nav-reviews">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="sobre.html" data-cy="nav-about">Sobre</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="page-header" data-cy="page-header">
    <div class="container">
      <h1><i class="bi bi-newspaper text-danger"></i> Notícias</h1>
      <p class="lead mb-0">As últimas novidades do universo dos jogos AAA — diretamente das fontes oficiais.</p>
    </div>
  </section>

  <div class="filter-bar">
    <div class="container">
      <div class="row g-3 align-items-center">
        <div class="col-lg-5">
          <div class="search-box input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input
              type="text"
              class="form-control"
              id="search-input"
              placeholder="Buscar notícia..."
              data-cy="search-input"
            />
          </div>
        </div>
        <div class="col-lg-7">
          <div class="d-flex flex-wrap gap-2 justify-content-lg-end" id="category-filters" data-cy="category-filters">
            <button class="btn cat-btn active" data-category="todos" data-cy="filter-todos">Todos</button>
            <button class="btn cat-btn" data-category="RPG" data-cy="filter-RPG">RPG</button>
            <button class="btn cat-btn" data-category="FPS" data-cy="filter-FPS">FPS</button>
            <button class="btn cat-btn" data-category="Mundo Aberto" data-cy="filter-mundo-aberto">Mundo Aberto</button>
            <button class="btn cat-btn" data-category="Indie AAA" data-cy="filter-indie">Indie AAA</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section>
    <div class="container">
      <div class="row g-4" id="news-grid" data-cy="news-grid"></div>
      <div class="empty-state d-none" id="no-results" data-cy="no-results">
        <i class="bi bi-emoji-frown"></i>
        <p class="lead mt-3">Nenhuma notícia encontrada.</p>
      </div>
    </div>
  </section>

  <footer>
    <div class="container text-center">
      <p class="small mb-0">© 2026 GameVerse - Projeto Acadêmico</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/news.js"></script>
</body>
</html>
