<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews | GameVerse</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body style="padding-top:70px;">
  <nav class="navbar navbar-expand-lg fixed-top" data-cy="main-navbar">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-controller text-danger"></i> Game<span class="text-danger">Verse</span>
      </a>
      <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <i class="bi bi-list fs-2"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="../index.html" data-cy="nav-home">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="noticias.html" data-cy="nav-news">Notícias</a></li>
          <li class="nav-item"><a class="nav-link active" href="reviews.html" data-cy="nav-reviews">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="sobre.html" data-cy="nav-about">Sobre</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="page-header" data-cy="page-header">
    <div class="container">
      <h1><i class="bi bi-star-fill text-warning"></i> Reviews</h1>
      <p class="lead mb-0">Análises aprofundadas dos maiores jogos AAA — com nota, prós e contras.</p>
    </div>
  </section>

  <div class="filter-bar">
    <div class="container">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Ordenar por</label>
          <select class="form-select" id="sort-select" data-cy="sort-select">
            <option value="recent">Mais recentes</option>
            <option value="score-desc">Maior nota</option>
            <option value="score-asc">Menor nota</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nota mínima: <span id="min-score-label" data-cy="min-score-label">0</span>+</label>
          <input type="range" class="form-range" min="0" max="100" step="5" value="0" id="min-score" data-cy="min-score" />
        </div>
      </div>
    </div>
  </div>

  <section>
    <div class="container">
      <div class="row g-4" id="reviews-grid" data-cy="reviews-grid"></div>
    </div>
  </section>

  <footer>
    <div class="container text-center">
      <p class="small mb-0">© 2026 GameVerse - Projeto Acadêmico</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/reviews.js"></script>
</body>
</html>
